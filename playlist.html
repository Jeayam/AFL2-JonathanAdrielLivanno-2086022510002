<!DOCTYPE html>
<html>
<head>
    <title>Playlist - VIBEO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="toggle">

<div class="navbar bg-dark text-white px-3">
    <div class="d-flex align-items-center">
        <label for="toggle" class="menu-btn me-3">☰</label>
        <h4 class="m-0">VIBEO</h4>
    </div>

    <div class="search-box">
        <input type="text" class="form-control" placeholder="Search playlist...">
    </div>

    <button class="btn btn-light">Sign In</button>
</div>

<div class="d-flex">

    <div class="sidebar p-3">
        <h5 class="mb-3">Menu</h5>
        <a href="index.html">Home</a>
        <a href="playlist.html">Playlist</a>
        <a href="favorites.html">Favorites</a>
    </div>

    <div class="content p-4">

        <div class="d-flex justify-content-between align-items-center">
            <h3 class="section-title">Your Playlists</h3>
            <div>
                <button class="arrow-btn">←</button>
                <button class="arrow-btn">→</button>
            </div>
        </div>

        <div class="scroll-container">
            <div class="music-item">
                <img src="images/p1.jpg" class="music-img">
                <p class="song-title">Chill Playlist</p>
                <p class="artist">15 Songs</p>
            </div>
            <div class="music-item">
                <img src="images/p2.jpg" class="music-img">
                <p class="song-title">Workout Hits</p>
                <p class="artist">20 Songs</p>
            </div>
            <div class="music-item">
                <img src="images/p3.jpg" class="music-img">
                <p class="song-title">Late Night</p>
                <p class="artist">12 Songs</p>
            </div>
            <div class="music-item">
                <img src="images/p4.jpg" class="music-img">
                <p class="song-title">Focus Mode</p>
                <p class="artist">18 Songs</p>
            </div>
            <div class="music-item">
                <img src="images/p5.jpg" class="music-img">
                <p class="song-title">Indie Mix</p>
                <p class="artist">10 Songs</p>
            </div>
            <div class="music-item">
                <img src="images/p6.jpg" class="music-img">
                <p class="song-title">Top Hits</p>
                <p class="artist">25 Songs</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
