<!DOCTYPE html>
<html>
<head>
    <title>Favorites - VIBEO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="toggle">

<div class="navbar bg-dark text-white px-3">
    <div class="d-flex align-items-center">
        <label for="toggle" class="menu-btn me-3">☰</label>
        <h4 class="m-0">VIBEO</h4>
    </div>

    <div class="search-box">
        <input type="text" class="form-control" placeholder="Search favorites...">
    </div>

    <button class="btn btn-light">Sign In</button>
</div>

<div class="d-flex">

    <div class="sidebar p-3">
        <h5 class="mb-3">Menu</h5>
        <a href="index.html">Home</a>
        <a href="playlist.html">Playlist</a>
        <a href="favorites.html">Favorites</a>
    </div>

    <div class="content p-4">

        <div class="d-flex justify-content-between align-items-center">
            <h3 class="section-title">Your Favorite Songs</h3>
            <div>
                <button class="arrow-btn">←</button>
                <button class="arrow-btn">→</button>
            </div>
        </div>

        <div class="scroll-container">
            <div class="music-item">
                <img src="images/song1.jpg" class="music-img">
                <p class="song-title">Favorite 1</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song2.jpg" class="music-img">
                <p class="song-title">Favorite 2</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song3.jpg" class="music-img">
                <p class="song-title">Favorite 3</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song4.jpg" class="music-img">
                <p class="song-title">Favorite 4</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song5.jpg" class="music-img">
                <p class="song-title">Favorite 5</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song6.jpg" class="music-img">
                <p class="song-title">Favorite 6</p>
                <p class="artist">Artist</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
