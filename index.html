<!DOCTYPE html>
<html>
<head>
    <title>Home - VIBEO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="toggle">

<!-- NAVBAR -->
<div class="navbar bg-dark text-white px-3">
    <div class="d-flex align-items-center">
        <label for="toggle" class="menu-btn me-3">☰</label>
        <h4 class="m-0">VIBEO</h4>    
    </div>

    <div class="search-box">
        <input type="text" class="form-control" placeholder="Search music...">
    </div>

    <button class="btn btn-light">Sign In</button>
</div>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">
        <h5 class="mb-3">Menu</h5>
        <a href="index.html">Home</a>
        <a href="playlist.html">Playlist</a>
        <a href="favorites.html">Favorites</a>
    </div>

    <!-- CONTENT -->
    <div class="content p-4">

        <!-- FAVORITES -->
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="section-title">Rediscover Your Favorites</h5>
            <div>
                <button class="arrow-btn">←</button>
                <button class="arrow-btn">→</button>
            </div>
        </div>

        <div class="scroll-container">
            <div class="music-item">
                <img src="images/song1.jpg" class="music-img">
                <p class="song-title">Song 1</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song2.jpg" class="music-img">
                <p class="song-title">Song 2</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song3.jpg" class="music-img">
                <p class="song-title">Song 3</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song4.jpg" class="music-img">
                <p class="song-title">Song 4</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song5.jpg" class="music-img">
                <p class="song-title">Song 5</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song6.jpg" class="music-img">
                <p class="song-title">Song 6</p>
                <p class="artist">Artist</p>
            </div>
        </div>

        <!-- HIDDEN GEMS -->
        <div class="d-flex justify-content-between align-items-center mt-4">
            <h5 class="section-title">Hidden Gems</h5>
            <div>
                <button class="arrow-btn">←</button>
                <button class="arrow-btn">→</button>
            </div>
        </div>

        <div class="scroll-container">
            <div class="music-item">
                <img src="images/song7.jpg" class="music-img">
                <p class="song-title">Hidden 1</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song8.jpg" class="music-img">
                <p class="song-title">Hidden 2</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song9.jpg" class="music-img">
                <p class="song-title">Hidden 3</p>
                <p class="artist">Artist</p>
            </div>
            <div class="music-item">
                <img src="images/song10.jpg" class="music-img">
                <p class="song-title">Hidden 4</p>
                <p class="artist">Artist</p>
            </div>
        </div>

        <!-- CATEGORY -->
        <h5 class="section-title mt-4">Categories</h5>
        <div class="row">
            <div class="col-md-3"><div class="category-box">Late Night Tales</div></div>
            <div class="col-md-3"><div class="category-box">Chill Vibes</div></div>
            <div class="col-md-3"><div class="category-box">Workout</div></div>
            <div class="col-md-3"><div class="category-box">Focus</div></div>
        </div>

    </div>

</div>

</body>
</html>
